server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Asset URLs in the HTML use /admin-v2/assets/... so the browser may
    # request them directly. Strip the prefix for local file lookup.
    location /admin-v2/ {
        rewrite ^/admin-v2/(.*) /$1 last;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
