services:

  realtime:
    build:
      context: ..
      dockerfile: Server/Dockerfile
    command: node src/realtime/index.js
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/app/data/competition.db
      - WS_PORT=3000
      - INTERNAL_PORT=3001
    volumes:
      - ./data:/app/data
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: Server/Dockerfile
    command: node src/api/index.js
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/app/data/competition.db
      - PORT=3000
      - REALTIME_URL=http://realtime:3001
    volumes:
      - ./data:/app/data
    networks:
      - internal
    depends_on:
      - realtime

  public-web:
    build:
      context: ../web/public
    restart: unless-stopped
    networks:
      - internal

  admin-web:
    build:
      context: ../web/admin
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - internal
    depends_on:
      - api
      - realtime
      - public-web
      - admin-web

networks:
  internal:
    driver: bridge
