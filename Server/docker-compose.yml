services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: liftoff
      POSTGRES_USER: liftoff
      POSTGRES_PASSWORD: liftoff
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liftoff"]
      interval: 5s
      timeout: 3s
      retries: 5

  realtime:
    build:
      context: ..
      dockerfile: Server/Dockerfile
    command: node src/realtime/index.js
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://liftoff:liftoff@postgres:5432/liftoff
      - WS_PORT=3000
      - INTERNAL_PORT=3001
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: Server/Dockerfile
    command: node src/api/index.js
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://liftoff:liftoff@postgres:5432/liftoff
      - PORT=3000
      - REALTIME_URL=http://realtime:3001
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      realtime:
        condition: service_started

  public-web:
    build:
      context: ../web/public
    restart: unless-stopped
    networks:
      - internal

  admin-web:
    build:
      context: ../web/admin
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - internal
    depends_on:
      - api
      - realtime
      - public-web
      - admin-web

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
    name: liftoff_pgdata
    external: true
