services:

  app:
    build:
      context: ..
      dockerfile: Server/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist the SQLite database outside the container
      - ./data:/app/data
    networks:
      - internal
    # Not exposed directly — nginx proxies all traffic

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Admin Basic Auth password file (created by init-htpasswd.sh)
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      # Let's Encrypt certificates (populated by init-certs.sh)
      - ./certbot/conf:/etc/letsencrypt:ro
      # ACME webroot challenge directory (used for cert renewal)
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - internal
    depends_on:
      - app

networks:
  internal:
    driver: bridge
