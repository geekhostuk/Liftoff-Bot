# To use a different domain, replace every occurrence of jesusmctwos.co.uk
# in this file with your actual domain name.

events {
    worker_connections 1024;
}

http {
    # ── Upstreams ──────────────────────────────────────────────────────────────
    upstream api {
        server api:3000;
    }

    upstream realtime {
        server realtime:3000;
    }

    upstream public-web {
        server public-web:80;
    }

    upstream admin-web {
        server admin-web:80;
    }

    upstream umami {
        server umami:3000;
    }

    # ── HTTP — redirect to HTTPS, but serve ACME challenge for cert renewal ──
    server {
        listen 80;
        server_name jesusmctwos.co.uk;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name jesusmctwos.co.uk;

        ssl_certificate     /etc/letsencrypt/live/jesusmctwos.co.uk/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/jesusmctwos.co.uk/privkey.pem;

        # Modern TLS only
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

        # Basic security headers
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss:" always;

        # ── WebSocket endpoints → realtime server ─────────────────────────────
        location /ws/ {
            proxy_pass http://realtime;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── REST API → api server ─────────────────────────────────────────────
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
        }

        # ── Admin UI → admin-web (auth handled by app) ────────────────────
        location /admin/ {
            proxy_pass http://admin-web/;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
        }

        # ── Umami Analytics → umami ────────────────────────────────────
        location /analytics {
            proxy_pass http://umami;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
        }

        # ── Public UI → public-web (default) ──────────────────────────────
        location / {
            proxy_pass http://public-web;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
        }
    }
}
